name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 43.133.164.69
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/git/wechat-fast-calculator
            git pull origin main
            cd server
            npm install --omit=dev
            pm2 restart wechat-api
